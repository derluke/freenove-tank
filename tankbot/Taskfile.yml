version: "3"

dotenv: [".env"]

vars:
  PI_HOST: '{{.PI_HOST | default "raspberrypi.local"}}'
  PI_USER: '{{.PI_USER | default "pi"}}'
  PI_DIR: '{{.PI_DIR | default "/home/pi/tankbot"}}'
  LOCAL_DIR: '{{.ROOT_DIR}}'
  CAMERA_CALIB: '{{.CAMERA_CALIB | default ""}}'

tasks:
  # ---------------------------------------------------------------------------
  # Pi deployment
  # ---------------------------------------------------------------------------
  pi:install-uv:
    desc: Install uv on the Raspberry Pi
    cmds:
      - ssh {{.PI_USER}}@{{.PI_HOST}} "curl -LsSf https://astral.sh/uv/install.sh | sh"

  pi:sync:
    desc: Rsync the tankbot code to the Pi
    cmds:
      - ssh {{.PI_USER}}@{{.PI_HOST}} "mkdir -p {{.PI_DIR}}"
      - >-
        rsync -avz --delete
        --exclude '__pycache__'
        --exclude '.venv'
        --exclude 'node_modules'
        --exclude '_build'
        --exclude 'deps'
        --exclude 'tankbot_web'
        --exclude '.mypy_cache'
        --exclude '.ruff_cache'
        "{{.LOCAL_DIR}}/src"
        "{{.LOCAL_DIR}}/pyproject.toml"
        "{{.LOCAL_DIR}}/uv.lock"
        {{.PI_USER}}@{{.PI_HOST}}:{{.PI_DIR}}/
      - ssh {{.PI_USER}}@{{.PI_HOST}} "mkdir -p {{.PI_DIR}}/vendor"
      - >-
        rsync -avz --delete
        "{{.LOCAL_DIR}}/vendor/lietorch"
        {{.PI_USER}}@{{.PI_HOST}}:{{.PI_DIR}}/vendor/

  pi:install:
    desc: Install Python dependencies on the Pi
    deps: [pi:sync]
    cmds:
      - ssh {{.PI_USER}}@{{.PI_HOST}} "cd {{.PI_DIR}} && ~/.local/bin/uv pip install -e '.[robot]'"
      # Symlink system-only Pi packages into the venv
      - >-
        ssh {{.PI_USER}}@{{.PI_HOST}} "
        VENV={{.PI_DIR}}/.venv/lib/python3.11/site-packages;
        ln -sf /usr/lib/python3/dist-packages/libcamera \$VENV/libcamera 2>/dev/null;
        ln -sf /usr/lib/python3/dist-packages/pykms \$VENV/pykms 2>/dev/null;
        echo 'System packages symlinked'
        "

  pi:deploy:
    desc: Full deploy — sync code + install deps on Pi
    cmds:
      - task: pi:sync
      - task: pi:install

  pi:start:
    desc: Start the robot server on the Pi
    cmds:
      - ssh -t {{.PI_USER}}@{{.PI_HOST}} "cd {{.PI_DIR}} && ~/.local/bin/uv run --extra robot tankbot-robot"

  pi:stop:
    desc: Stop the robot server on the Pi
    cmds:
      - ssh {{.PI_USER}}@{{.PI_HOST}} "pkill -f 'tankbot-robot' || true"

  pi:restart:
    desc: Stop, deploy, and restart the robot server
    cmds:
      - task: pi:stop
      - task: pi:deploy
      - task: pi:start

  pi:logs:
    desc: Tail robot logs on the Pi
    cmds:
      - ssh -t {{.PI_USER}}@{{.PI_HOST}} "journalctl --user -u tankbot -f 2>/dev/null || echo 'No systemd service, use pi:start instead'"

  pi:ssh:
    desc: Open an SSH session to the Pi
    interactive: true
    cmds:
      - ssh {{.PI_USER}}@{{.PI_HOST}}

  # ---------------------------------------------------------------------------
  # Desktop — Phoenix web app
  # ---------------------------------------------------------------------------
  web:setup:
    desc: Install Phoenix dependencies and build assets
    dir: tankbot_web
    cmds:
      - mix deps.get
      - mix assets.setup
      - mix assets.build

  web:start:
    desc: Start the Phoenix dev server
    dir: tankbot_web
    cmds:
      - mix phx.server

  tmux:dev:
    desc: Open or attach to a tmux dev session for this repo
    cmds:
      - bash scripts/dev-tmux.sh

  web:iex:
    desc: Start Phoenix in interactive Elixir shell
    dir: tankbot_web
    interactive: true
    cmds:
      - iex -S mix phx.server

  # ---------------------------------------------------------------------------
  # Desktop — Autonomy / Vision
  # ---------------------------------------------------------------------------
  vision:setup:
    desc: Install Python desktop dependencies (torch, etc.)
    cmds:
      - uv sync --extra desktop

  vision:setup:viz:
    desc: Install the vendored MASt3R-SLAM viewer stack (imgui/in3d/moderngl)
    cmds:
      - uv pip install --python .venv/bin/python -e vendor/MASt3R-SLAM/thirdparty/in3d

  vision:setup:rope:
    desc: Build the CUDA RoPE2D extension used by upstream MASt3R/DUSt3R
    env:
      TORCH_CUDA_ARCH_LIST: "8.9"
    cmds:
      - >-
        uv pip install --python .venv/bin/python --no-build-isolation
        -e vendor/MASt3R-SLAM/thirdparty/mast3r/dust3r/croco/models/curope

  vision:start:
    desc: Start the reactive autonomy engine (depth-based wander, no SLAM)
    cmds:
      - uv run tankbot-reactive --robot ws://{{.PI_HOST}}:9000

  vision:debug:
    desc: Reactive autonomy engine in debug mode (no motor commands)
    cmds:
      - uv run tankbot-reactive --robot ws://{{.PI_HOST}}:9000 --debug

  vision:mast3r:start:
    desc: Start vanilla live MASt3R-SLAM on the robot camera and export to the web viewer
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        ROBOT_URL=ws://{{.PI_HOST}}:9000
        TANKBOT_LIVE_PLY_PATH=tankbot_web/priv/static/assets/splat/scene.ply
        TANKBOT_LIVE_PLY_EVERY={{default "10" .EXPORT_EVERY}}
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset robot
        --config vendor/MASt3R-SLAM/config/base.yaml
        --no-viz

  vision:mast3r:start:calib:
    desc: Start vanilla live MASt3R-SLAM with camera calibration and export to the web viewer
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:mast3r:start:calib CAMERA_CALIB=vendor/MASt3R-SLAM/config/intrinsics.yaml`
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        ROBOT_URL=ws://{{.PI_HOST}}:9000
        TANKBOT_LIVE_PLY_PATH=tankbot_web/priv/static/assets/splat/scene.ply
        TANKBOT_LIVE_PLY_EVERY={{default "10" .EXPORT_EVERY}}
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset robot
        --config vendor/MASt3R-SLAM/config/base.yaml
        --calib {{.CAMERA_CALIB}}
        --no-viz

  vision:legacy:start:
    desc: Start the old integrated Tankbot vision engine
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000

  vision:legacy:start:calib:
    desc: Start the old integrated Tankbot vision engine with camera calibration enabled
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:legacy:start:calib CAMERA_CALIB=vendor/MASt3R-SLAM/config/intrinsics.yaml`
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000 --calib {{.CAMERA_CALIB}}

  vision:legacy:debug:
    desc: Legacy vision engine debug mode — SLAM tracking, no motor commands
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000 --debug

  vision:legacy:debug:calib:
    desc: Legacy vision debug mode with camera calibration enabled
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:legacy:debug:calib CAMERA_CALIB=vendor/MASt3R-SLAM/config/intrinsics.yaml`
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000 --debug --calib {{.CAMERA_CALIB}}

  vision:record:
    desc: Record manual driving — SLAM + your inputs saved to recordings/
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000 --debug --record

  vision:record:calib:
    desc: Record manual driving with camera calibration enabled
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:record:calib CAMERA_CALIB=vendor/MASt3R-SLAM/config/intrinsics.yaml`
    cmds:
      - uv run tankbot-vision --robot ws://{{.PI_HOST}}:9000 --debug --record --calib {{.CAMERA_CALIB}}

  vision:calibrate:
    desc: Capture checkerboard views from the robot stream and write camera intrinsics YAML
    cmds:
      - >-
        uv run tankbot-calibrate-camera
        --robot ws://{{.PI_HOST}}:9000
        --output calibration/camera_intrinsics.yaml

  vision:record:raw:
    desc: Record raw robot webcam frames to a folder for vanilla MASt3R-SLAM
    cmds:
      - >-
        uv run tankbot-record-robot-stream
        --robot ws://{{.PI_HOST}}:9000
        --output-dir recordings/mast3r_raw/{{default "latest" .RUN}}
        --max-frames {{default "600" .MAX_FRAMES}}
        --duration {{default "0" .DURATION}}

  record:phase0c:
    desc: Record a multi-channel dataset (frames + telemetry + IMU + motor) for Phase 0c replay eval
    cmds:
      - >-
        uv run tankbot-record-robot-stream
        --robot ws://{{.PI_HOST}}:9000
        --output-dir recordings/phase0c/{{default "latest" .RUN}}
        --max-frames {{default "2000" .MAX_FRAMES}}
        --duration {{default "60" .DURATION}}

  replay:scanmatch:
    desc: Replay a recorded dataset through the scan-match pipeline (with IMU + motor gating)
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a recording dir, e.g. `task replay:scanmatch DATASET=recordings/phase0c/latest`
    cmds:
      - >-
        uv run tankbot-replay-scanmatch
        --dataset {{.DATASET}}
        {{if .HEADLESS}}--headless{{end}}
        {{if .MAX_FRAMES}}--max-frames {{.MAX_FRAMES}}{{end}}

  scanmatch:eval:
    desc: Evaluate one scan-match config against a recorded dataset (needs ground_truth.json)
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a recording dir, e.g. `task scanmatch:eval DATASET=recordings/phase0c/straight_2m`
    cmds:
      - >-
        uv run --extra desktop tankbot-scanmatch-eval eval
        --dataset {{.DATASET}}
        {{if .REBUILD}}--rebuild-cache{{end}}

  scanmatch:sweep:
    desc: Grid-sweep scan-match thresholds against a recording (caches depth inference across runs)
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a recording dir, e.g. `task scanmatch:sweep DATASET=recordings/phase0c/straight_2m`
    cmds:
      - >-
        uv run --extra desktop tankbot-scanmatch-eval sweep
        --dataset {{.DATASET}}
        {{if .SAVE_JSON}}--save-json {{.SAVE_JSON}}{{end}}
        {{if .REBUILD}}--rebuild-cache{{end}}

  frontier:replay:
    desc: Replay a recording through the rolling frontier grid (uses scan-match pose + health gating)
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a recording dir, e.g. `task frontier:replay DATASET=recordings/phase0c/straight_2m`
    cmds:
      - >-
        uv run --extra desktop tankbot-replay-frontier
        --dataset {{.DATASET}}
        {{if .RENDER_DIR}}--render-dir {{.RENDER_DIR}}{{end}}
        {{if .MAX_FRAMES}}--max-frames {{.MAX_FRAMES}}{{end}}
        {{if .REBUILD}}--rebuild-cache{{end}}

  frontier:sweep:
    desc: Replay the rolling frontier planner across a dataset root and print a compact summary table
    preconditions:
      - sh: test -n "{{.DATASET_ROOT}}"
        msg: Set DATASET_ROOT to a recordings dir, e.g. `task frontier:sweep DATASET_ROOT=recordings/phase0c`
    cmds:
      - >-
        uv run --extra desktop tankbot-replay-frontier
        --dataset-root {{.DATASET_ROOT}}
        {{if .RENDER_DIR}}--render-dir {{.RENDER_DIR}}{{end}}
        {{if .MAX_FRAMES}}--max-frames {{.MAX_FRAMES}}{{end}}
        {{if .SAVE_JSON}}--save-json {{.SAVE_JSON}}{{end}}
        {{if .INCLUDE_DERIVED}}--include-derived{{end}}
        {{if .REBUILD}}--rebuild-cache{{end}}

  projection:inspect:
    desc: Render per-pixel depth→robot-frame→scan-band diagnostic for a single frame
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a recording dir, e.g. `task projection:inspect DATASET=recordings/phase0c/straight_1m_1 FRAME=120`
    cmds:
      - >-
        uv run --extra desktop tankbot-projection-inspect
        --dataset {{.DATASET}}
        {{if .FRAME}}--frame {{.FRAME}}{{end}}
        {{if .OUTPUT}}--output {{.OUTPUT}}{{end}}
        {{if .BACKEND}}--backend {{.BACKEND}}{{end}}
        {{if .DEPTH_SCALE}}--depth-scale {{.DEPTH_SCALE}}{{end}}

  vision:vanilla:mast3r:
    desc: Run upstream MASt3R-SLAM on a recorded raw frame folder
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a raw frame folder, e.g. `task vision:vanilla:mast3r DATASET=recordings/mast3r_raw/latest CAMERA_CALIB=calibration/camera_intrinsics.yaml`
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:vanilla:mast3r DATASET=recordings/mast3r_raw/latest CAMERA_CALIB=calibration/camera_intrinsics.yaml`
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset {{.DATASET}}
        --config vendor/MASt3R-SLAM/config/base.yaml
        --calib {{.CAMERA_CALIB}}
        --no-viz

  vision:vanilla:robot:
    desc: Run upstream MASt3R-SLAM live on the Tankbot camera stream
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:vanilla:robot CAMERA_CALIB=calibration/camera_intrinsics.yaml`
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        ROBOT_URL=ws://{{.PI_HOST}}:9000
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset robot
        --config vendor/MASt3R-SLAM/config/base.yaml
        --calib {{.CAMERA_CALIB}}

  vision:vanilla:robot:headless:
    desc: Run upstream MASt3R-SLAM live on the Tankbot camera stream without the viewer
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:vanilla:robot:headless CAMERA_CALIB=calibration/camera_intrinsics.yaml`
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        ROBOT_URL=ws://{{.PI_HOST}}:9000
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset robot
        --config vendor/MASt3R-SLAM/config/base.yaml
        --calib {{.CAMERA_CALIB}}
        --no-viz

  vision:vanilla:robot:web:
    desc: Run upstream MASt3R-SLAM live and periodically export the latest PLY to the web viewer
    preconditions:
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:vanilla:robot:web CAMERA_CALIB=calibration/camera_intrinsics.yaml`
    cmds:
      - >-
        mkdir -p tankbot_web/priv/static/assets/splat
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        ROBOT_URL=ws://{{.PI_HOST}}:9000
        TANKBOT_LIVE_PLY_PATH=tankbot_web/priv/static/assets/splat/scene.ply
        TANKBOT_LIVE_PLY_EVERY={{default "30" .EXPORT_EVERY}}
        uv run python vendor/MASt3R-SLAM/main.py
        --dataset robot
        --config vendor/MASt3R-SLAM/config/base.yaml
        --calib {{.CAMERA_CALIB}}
        --no-viz

  vision:replay:robot:
    desc: Run Tankbot's own SLAM adapter on a recorded raw frame folder
    preconditions:
      - sh: test -n "{{.DATASET}}"
        msg: Set DATASET to a raw frame folder, e.g. `task vision:replay:robot DATASET=recordings/mast3r_raw/latest CAMERA_CALIB=calibration/camera_intrinsics.yaml`
      - sh: test -n "{{.CAMERA_CALIB}}"
        msg: Set CAMERA_CALIB to an intrinsics YAML path, e.g. `task vision:replay:robot DATASET=recordings/mast3r_raw/latest CAMERA_CALIB=calibration/camera_intrinsics.yaml`
    cmds:
      - >-
        UV_CACHE_DIR=/tmp/uv-cache
        uv run tankbot-replay-slam-dataset
        --dataset {{.DATASET}}
        --save-as {{default "robot_replay" .RUN}}
        --calib {{.CAMERA_CALIB}}

  vision:vanilla:publish:
    desc: Publish a saved vanilla MASt3R-SLAM PLY into the web assets for viewing
    preconditions:
      - sh: test -n "{{.RUN}}"
        msg: Set RUN to a saved run basename, e.g. `task vision:vanilla:publish RUN=vanilla1`
      - sh: test -f "logs/{{.RUN}}.ply"
        msg: Missing logs/{{.RUN}}.ply. Run `vision:vanilla:mast3r` first.
    cmds:
      - mkdir -p tankbot_web/priv/static/assets/splat/saved
      - cp "logs/{{.RUN}}.ply" "tankbot_web/priv/static/assets/splat/saved/{{.RUN}}.ply"

  slam:setup:
    desc: Clone MASt3R-SLAM and build CUDA extensions
    env:
      TORCH_CUDA_ARCH_LIST: "8.9"
    cmds:
      - mkdir -p vendor
      - >-
        test -d vendor/MASt3R-SLAM ||
        git clone --recursive https://github.com/rmurai0610/MASt3R-SLAM.git vendor/MASt3R-SLAM
      - bash scripts/patch-mast3r-slam.sh vendor/MASt3R-SLAM
      - uv pip install --python .venv/bin/python setuptools
      - >-
        uv pip install --python .venv/bin/python --no-build-isolation
        -e vendor/MASt3R-SLAM/thirdparty/mast3r/dust3r/croco/models/curope
      - uv pip install --python .venv/bin/python -e vendor/MASt3R-SLAM/thirdparty/in3d
      - uv pip install --no-build-isolation --python .venv/bin/python -e vendor/MASt3R-SLAM/thirdparty/mast3r
      - uv pip install --no-build-isolation --python .venv/bin/python -e vendor/MASt3R-SLAM
      # Download model checkpoints (~2.6 GB total)
      - mkdir -p vendor/MASt3R-SLAM/checkpoints
      - >-
        test -f vendor/MASt3R-SLAM/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth ||
        wget -P vendor/MASt3R-SLAM/checkpoints/
        https://download.europe.naverlabs.com/ComputerVision/MASt3R/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth
      - >-
        test -f vendor/MASt3R-SLAM/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_trainingfree.pth ||
        wget -P vendor/MASt3R-SLAM/checkpoints/
        https://download.europe.naverlabs.com/ComputerVision/MASt3R/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_trainingfree.pth
      - >-
        test -f vendor/MASt3R-SLAM/checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_codebook.pkl ||
        wget -P vendor/MASt3R-SLAM/checkpoints/
        https://download.europe.naverlabs.com/ComputerVision/MASt3R/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric_retrieval_codebook.pkl

  # ---------------------------------------------------------------------------
  # Development — lint, typecheck, format
  # ---------------------------------------------------------------------------
  lint:
    desc: Run ruff linter
    cmds:
      - uv run --dev ruff check {{.LOCAL_DIR}}/src

  lint:fix:
    desc: Run ruff linter with auto-fix
    cmds:
      - uv run --dev ruff check --fix {{.LOCAL_DIR}}/src

  format:
    desc: Run ruff formatter
    cmds:
      - uv run --dev ruff format {{.LOCAL_DIR}}/src

  typecheck:
    desc: Run mypy type checker
    cmds:
      - uv run --dev mypy {{.LOCAL_DIR}}/src/tankbot

  test:
    desc: Run the fast test suite (skips slow scan-match regression tests)
    cmds:
      - uv run --dev --extra desktop pytest -m "not slow"

  test:slow:
    desc: Run the slow regression tests (needs cached observations_*.npz — see scanmatch:eval)
    cmds:
      - uv run --dev --extra desktop pytest -m slow

  test:all:
    desc: Run the full test suite (fast + slow)
    cmds:
      - uv run --dev --extra desktop pytest

  check:
    desc: Run all checks (lint + typecheck + fast tests + format check)
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - uv run --dev ruff format --check {{.LOCAL_DIR}}/src

  # ---------------------------------------------------------------------------
  # Compound workflows
  # ---------------------------------------------------------------------------
  up:
    desc: Deploy to Pi and start everything (robot + web + vision)
    cmds:
      - task: pi:deploy
      - task: pi:start
    # Run web and vision separately in other terminals:
    # task web:start
    # task vision:start

  dev:
    desc: Quick iteration — sync to Pi and restart robot
    cmds:
      - task: pi:restart

  setup:
    desc: First-time setup — install everything everywhere
    cmds:
      - task: pi:install-uv
      - task: pi:deploy
      - task: web:setup
      - task: vision:setup
      - task: slam:setup
